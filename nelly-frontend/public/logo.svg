<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle for logo icon -->
  <circle cx="30" cy="30" r="25" fill="url(#gradient1)" opacity="0.9"/>
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF1493;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF69B4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fashion icon - stylized hanger -->
  <path d="M30 10 C35 10, 40 15, 40 20 C40 25, 35 30, 30 30 C25 30, 20 25, 20 20 C20 15, 25 10, 30 10 Z" 
        fill="white" opacity="0.9"/>
  <path d="M30 30 L30 45 M20 35 L40 35" 
        stroke="white" stroke-width="2" fill="none" opacity="0.9"/>
  
  <!-- NELLY text -->
  <text x="65" y="25" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="url(#gradient2)">
    NELLY
  </text>
  
  <!-- Tagline -->
  <text x="65" y="42" font-family="Arial, sans-serif" font-size="8" fill="#666" letter-spacing="2">
    FASHION FORWARD
  </text>
</svg>
